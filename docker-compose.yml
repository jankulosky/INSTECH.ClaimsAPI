services:
  db:
    image: postgres:16-alpine
    container_name: claims-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-claimsdb}
      POSTGRES_USER: ${POSTGRES_USER:-claims}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "55432:5432"
    volumes:
      - claims-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-claims} -d ${POSTGRES_DB:-claimsdb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claims-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__PrimaryDatabase: Host=db;Port=5432;Database=${POSTGRES_DB:-claimsdb};Username=${POSTGRES_USER:-claims};Password=${POSTGRES_PASSWORD:-change-me};Ssl Mode=Disable
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  claims-postgres-data:
